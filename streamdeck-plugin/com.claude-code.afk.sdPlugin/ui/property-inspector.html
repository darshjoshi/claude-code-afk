<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bridge Key Settings</title>
  <link rel="stylesheet" href="https://sdpi-components.dev/css/sdpi.css" />
  <style>
    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #cc3333;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status-dot.connected {
      background: #33cc33;
    }
  </style>
</head>
<body>
  <div class="sdpi-wrapper">
    <div class="sdpi-item">
      <div class="sdpi-item-label">Bridge URL</div>
      <input class="sdpi-item-value" id="bridgeUrl" type="text" placeholder="ws://127.0.0.1:8247" />
    </div>
    <div class="sdpi-item">
      <div class="sdpi-item-label">Status</div>
      <div class="sdpi-item-value">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Unknown</span>
      </div>
    </div>
    <div class="sdpi-item">
      <button class="sdpi-item-value" id="saveBtn">Save</button>
    </div>
  </div>

  <script>
    var $SD = window.$SD || {};
    var websocket = null;
    var uuid = "";
    var globalSettings = {};

    function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      uuid = inUUID;
      websocket = new WebSocket("ws://127.0.0.1:" + inPort);

      websocket.onopen = function () {
        websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
        websocket.send(JSON.stringify({ event: "getGlobalSettings", context: inUUID }));
      };

      websocket.onmessage = function (evt) {
        var data = JSON.parse(evt.data);
        if (data.event === "didReceiveGlobalSettings") {
          globalSettings = data.payload.settings || {};
          document.getElementById("bridgeUrl").value = globalSettings.bridgeUrl || "ws://127.0.0.1:8247";
        }
      };
    }

    document.getElementById("saveBtn").addEventListener("click", function () {
      var url = document.getElementById("bridgeUrl").value.trim();
      if (!url) url = "ws://127.0.0.1:8247";
      globalSettings.bridgeUrl = url;
      if (websocket && websocket.readyState === WebSocket.OPEN) {
        websocket.send(JSON.stringify({
          event: "setGlobalSettings",
          context: uuid,
          payload: globalSettings
        }));
      }
    });

    // Probe bridge connectivity
    function checkBridge() {
      var url = document.getElementById("bridgeUrl").value.trim() || "ws://127.0.0.1:8247";
      var httpUrl = url.replace("ws://", "http://").replace("wss://", "https://");
      var statusUrl = httpUrl.replace(/\/$/, "") + "/status";
      fetch(statusUrl, { mode: "no-cors" })
        .then(function () {
          document.getElementById("statusDot").classList.add("connected");
          document.getElementById("statusText").textContent = "Reachable";
        })
        .catch(function () {
          document.getElementById("statusDot").classList.remove("connected");
          document.getElementById("statusText").textContent = "Unreachable";
        });
    }
    setInterval(checkBridge, 5000);
    setTimeout(checkBridge, 500);
  </script>
</body>
</html>
